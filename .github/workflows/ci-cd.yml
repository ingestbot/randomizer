name: CI/CD Pipeline - randomizer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ingestbot
      DOCKER_IMAGE_NAME: randomizer
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: get user with UID 1000
        run: |
          getent passwd 1000

      - name: who am i and id
        run: |
          echo "$USER"
          whoami
          id "$USER"

      - name: Get Docker group ID
        id: get_docker_gid
        run: |
          DOCKER_GID=$(getent group docker | cut -d: -f3)
          echo "DOCKER_GID=${DOCKER_GID}" >> "$GITHUB_ENV"

      - name: Check Docker Socket
        run: ls -l /var/run/docker.sock || echo "Docker socket not found"

      - name: Set up environment variables
        run: echo "SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_ENV"

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.82.8

      - name: Super-Linter
        uses: super-linter/super-linter@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # VALIDATE_PYTHON_PYLINT: false
          VALIDATE_JSCPD: false
          # VALIDATE_YAML: false
          # VALIDATE_DOCKERFILE_HADOLINT: false

      - uses: actions/upload-artifact@v4
        with:
          name: super-linter-report
          path: super-linter-output/

      - name: Docker Login
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          # password: ${{ secrets.DOCKER_PASSWORD }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      #
      # https://github.com/marketplace/actions/docker-setup-buildx
      #
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build local container
        uses: docker/build-push-action@v7
        with:
          tags: localbuild/testimage
          push: false
          load: true

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "localbuild/testimage"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Run Trivy and save report
        run: |
          trivy image --format table --severity CRITICAL --ignore-unfixed localbuild/testimage | tee trivy-report.txt

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Anchore Container Scan
        uses: anchore/scan-action@v5.0.0
        with:
          image: "localbuild/testimage"
          fail-build: true
          # severity-cutoff: high
          severity-cutoff: critical
          output-format: table
          ignore-unfixed: true

      - name: Run the Docker container | capture logs | verify logs
        run: |
          container_id=$(docker run -d  --group-add "$DOCKER_GID" -v /var/run/docker.sock:/var/run/docker.sock localbuild/testimage)
          timeout=180
          interval=5
          elapsed=0

          while [ "$elapsed" -lt "$timeout" ]; do
              if docker logs "$container_id" 2>&1 | grep -q "Starting randomizer"; then
                  echo "PASS"
                  exit 0
              fi
              sleep "$interval"
              elapsed=$((elapsed + interval))
          done

          echo "FAIL: expected logging not found within the timeout period."
          docker logs "$container_id"
          exit 1

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.SHORT_SHA }}
